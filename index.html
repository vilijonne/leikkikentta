<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<h1 class="text-center my-4">Mun erinomaiset kissat</h1>
<div class="container">
  <div class="row g-4">

    <div class="col-md-4">
      <div class="card">
        <img src="images/ella.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title card-title-warning">Ella</h5>
          <p class="card-text">näykkii nilkkoja</p>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#infoModal">Lisätietoja</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="images/helmi.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Helmi</h5>
          <p class="card-text">hyppää niskaan ja luikahtaa ovenraoista</p>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#infoModal">Lisätietoja</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="images/kapu.jpg" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Kapu</h5>
          <p class="card-text">aina takussa</p>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#infoModal">Lisätietoja</button>
        </div>
      </div>
    </div>

  </div>
</div>
<div class="modal fade" id="infoModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Lisätietoja</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Tämä on esimerkki Bootstrap-modalista.
      </div>
    </div>
  </div>
</div>
<style>
  body {
    background: #f8f9fa;
  }
  .card-title {
    color: #0d6efd;
  }
</style>
